        '404':
          $ref: '#/components/responses/NotFound'

  /field-values:
    post:
      operationId: setFieldValue
      summary: Set a field value
      description: |
        Creates or updates the value for a given entity+field pair (upsert).
        The value is validated against the field's type before being saved.
      tags: [Field Values]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldValueInput'
      responses:
        '200':
          description: Field value created or updated.
          content:
