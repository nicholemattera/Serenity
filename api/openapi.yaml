      parameters:
        - $ref: '#/components/parameters/enrich'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityUpdateInput'
      responses:
        '200':
          description: Entity updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteEntity
      summary: Delete an entity
      tags: [Entities]
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{id}/children:
    get:
      operationId: listEntityChildren
      summary: List direct children of an entity
      tags: [Entities]
      parameters:
        - $ref: '#/components/parameters/id'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/enrich'
      responses:
        '200':
          description: Paginated list of child entities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityPage'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{id}/move:
    post:
      operationId: moveEntity
      summary: Move an entity within its tree
      description: |
        Repositions an entity and its subtree. Set `parent_id` to null to promote to root.
        The entity must stay within the same tree.
      tags: [Entities]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveInput'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /entities/{id}/move-root:
    post:
      operationId: moveEntityRoot
      summary: Reorder a root entity within its composite
      description: |
        Changes the `root_position` of a root entity among its siblings in the composite.
        The entity must currently be a root node (no parent).
      tags: [Entities]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRootInput'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

