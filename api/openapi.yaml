        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/enrich'
      responses:
        '200':
          description: Paginated list of entities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityPage'
        '403':
          $ref: '#/components/responses/Forbidden'

  /composites/{compositeID}/entities/slug/{slug}:
    get:
      operationId: getEntityBySlug
      summary: Get an entity by slug
      tags: [Entities]
      parameters:
        - name: compositeID
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/enrich'
      responses:
        '200':
          description: Entity found.
          content:
            application/json:
